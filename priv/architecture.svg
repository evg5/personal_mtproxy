<!-- step 2: TCP write down_conn→Telegram -->
<line x1="804" y1="580" x2="976" y2="580" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arg)"/>
<text x="890" y="574" text-anchor="middle" font-size="8" fill="#16a34a">TCP write</text>

<!-- step 3: ← ok [return] send/2 returns -->
